version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Open security-only PRs immediately; version updates weekly.
    open-pull-requests-limit: 5
    # Keep major upgrades separate so they don't pile up.
    groups:
      production-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
        dependency-type: "production"
      dev-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
        dependency-type: "development"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
